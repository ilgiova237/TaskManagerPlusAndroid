name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g expo-cli

      - name: Create placeholder icon
        run: |
          mkdir -p assets
          python3 make_icon.py

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean --no-install

      - name: Pin Gradle to 8.10.2
        run: |
          sed -i 's|distributionUrl=.*|distributionUrl=https\://services.gradle.org/distributions/gradle-8.10.2-bin.zip|g' android/gradle/wrapper/gradle-wrapper.properties

      - name: Patch app/build.gradle react-native path
        run: |
          echo "=== app/build.gradle ===" 
          cat -n android/app/build.gradle
          echo "=== Patching ==="
          # Fix null getAbsolutePath - replace the react-native path resolution
          sed -i 's|new File(\["node", "--print".*\]\.execute()\.text\.trim())|new File(project.projectDir, "../../node_modules/react-native")|g' android/app/build.gradle
          # Alternative: find any line with execute().text.trim() and fix it
          python3 - << 'PYEOF'
          import re
          with open('android/app/build.gradle', 'r') as f:
              content = f.read()
          # Replace the problematic node execution with a direct path
          fixed = re.sub(
              r'new File\(\[.*?execute\(\)\.text\.trim\(\)\)',
              'new File(rootProject.projectDir, "../node_modules/react-native")',
              content,
              flags=re.DOTALL
          )
          with open('android/app/build.gradle', 'w') as f:
              f.write(fixed)
          print("Done patching")
          PYEOF
          echo "=== After patch ==="
          cat -n android/app/build.gradle

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TaskManagerPlus-APK
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
