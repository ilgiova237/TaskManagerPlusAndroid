name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g expo-cli

      - name: Create placeholder icon
        run: |
          mkdir -p assets
          python3 make_icon.py

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean --no-install

      - name: Find and patch Kotlin 1.9.25 everywhere
        run: |
          echo "=== Files containing 1.9.25 ==="
          grep -r "1\.9\.25" android/ --include="*.gradle" --include="*.properties" --include="*.kts" -l || echo "none found in android/"
          echo "=== Patching all gradle files ==="
          find android/ -name "*.gradle" -o -name "*.kts" -o -name "*.properties" | xargs grep -l "1\.9\.25" 2>/dev/null | while read f; do
            echo "Patching: $f"
            sed -i 's/1\.9\.25/2.0.21/g' "$f"
          done
          echo "=== Patch Gradle wrapper ==="
          sed -i 's|distributionUrl=.*|distributionUrl=https\://services.gradle.org/distributions/gradle-8.10.2-bin.zip|g' android/gradle/wrapper/gradle-wrapper.properties
          echo "=== Verifying ==="
          grep -r "1\.9\.25" android/ || echo "No more 1.9.25 found"
          grep -r "2\.0\.21" android/ --include="*.gradle" --include="*.kts" | head -5

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TaskManagerPlus-APK
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
